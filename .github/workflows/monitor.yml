name: tennis-monitor

# 每半小时跑一轮(:07 和 :37, cron 是 UTC)，设两次是为了对冲 GitHub 偶尔跳过，
# 实际约每小时有效一次。脚本内部按太平洋时间 8:00–21:00 只在时段内工作，时段外立即退出。
# 注意：GitHub 免费定时器可能延迟/跳过，属正常；要更准时就挂 Mac/VPS。
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      send_test:
        description: "手动触发时发一条测试推送（验证 secrets→ntfy 通路）"
        type: boolean
        default: false

concurrency:
  group: tennis-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      # 跨运行保留去重状态（避免每 5 分钟重复推同一个空场）
      - name: Restore dedup state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: tennis-state-${{ github.run_id }}
          restore-keys: |
            tennis-state-

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_CONTROL_TOPIC: ${{ secrets.NTFY_CONTROL_TOPIC }}
        run: |
          if [ "${{ inputs.send_test }}" = "true" ]; then
            python monitor.py --test
          else
            python monitor.py --once
          fi

      - name: Save dedup state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: tennis-state-${{ github.run_id }}
